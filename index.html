<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2023年度　公立・私立大学学費検索｜まなびシード</title>
<style>
:root{
  --ink:#1c2733; --ink-soft:#52606d; --line:#e3e0d8; --line-soft:#efece4;
  --paper:#f7f4ec; --card:#fffdf8; --accent:#2f6b5e; --accent-soft:#e7f0ec;
  --accent-deep:#1f4f45; --warm:#c2703d; --warm-soft:#f6ebe2;
  --shadow:0 1px 2px rgba(28,39,51,.04),0 8px 24px rgba(28,39,51,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  background:var(--paper); color:var(--ink);
  font-size:14px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:1080px;margin:0 auto;padding:20px 24px 60px}
header.top{display:flex;align-items:baseline;gap:14px;padding-bottom:14px;border-bottom:2px solid var(--ink);margin-bottom:6px}
header.top h1{font-size:21px;font-weight:600;letter-spacing:.04em}
header.top .sub{font-size:12px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif}
header.top .year{margin-left:auto;font-size:11px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;border:1px solid var(--line);padding:3px 9px;border-radius:20px;background:var(--card)}
nav.tabs{display:flex;gap:4px;margin:18px 0 20px}
nav.tabs button{
  font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:13px;
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  padding:9px 18px;border-radius:9px 9px 0 0;cursor:pointer;transition:.15s;border-bottom:2px solid transparent;
}
nav.tabs button:hover{color:var(--ink);background:var(--card)}
nav.tabs button.on{color:var(--accent-deep);border-color:var(--line);border-bottom:2px solid var(--accent);background:var(--accent-soft);font-weight:600}
.panel{display:none;animation:fade .25s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.field{font-family:"Hiragino Kaku Gothic ProN",sans-serif}
label.lab{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;letter-spacing:.02em}
input[type=text],select{
  font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:14px;
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:var(--card);color:var(--ink);transition:.15s;
}
input[type=text]:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>div{flex:1;min-width:160px}
.hint{font-size:11px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;margin-top:4px}

/* suggest list */
.suggest{position:relative}
.suggest-list{position:absolute;z-index:30;left:0;right:0;top:calc(100% + 4px);background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);max-height:280px;overflow:auto;display:none}
.suggest-list.show{display:block}
.suggest-list div{padding:9px 13px;cursor:pointer;font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:13px;border-bottom:1px solid var(--line-soft)}
.suggest-list div:last-child{border-bottom:none}
.suggest-list div:hover,.suggest-list div.act{background:var(--accent-soft);color:var(--accent-deep)}

/* result card */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;margin-top:18px}
.card .uni{font-size:19px;font-weight:600;letter-spacing:.03em}
.card .fac{font-size:13px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;margin-top:3px}
.tag{display:inline-block;font-size:11px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;padding:2px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent-deep);margin-left:8px;vertical-align:middle}
.tag.r{background:var(--warm-soft);color:var(--warm)}
.tag.y{background:var(--ink);color:#fff}

.figs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
.fig{background:var(--paper);border:1px solid var(--line-soft);border-radius:11px;padding:14px 15px;position:relative}
.fig .k{font-size:11px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;letter-spacing:.02em}
.fig .v{font-size:21px;font-weight:600;margin-top:6px;letter-spacing:.01em}
.fig .v small{font-size:12px;font-weight:400;color:var(--ink-soft);margin-left:2px}
.fig.hero{background:var(--accent);border-color:var(--accent)}
.fig.hero .k{color:#cfe6df}
.fig.hero .v{color:#fff}
.fig.hero .v small{color:#cfe6df}
.fig.accent{background:var(--warm-soft);border-color:#ecd9c9}
.fig.accent .v{color:var(--warm)}

.brk{margin-top:20px;border-top:1px dashed var(--line);padding-top:16px}
.brk h4{font-size:12px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;color:var(--ink-soft);margin-bottom:10px;letter-spacing:.04em}
.brk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px 18px}
.brk-grid .li{display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid var(--line-soft);padding:5px 0;font-family:"Hiragino Kaku Gothic ProN",sans-serif}
.brk-grid .li span:first-child{color:var(--ink-soft)}
.yearflow{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.yearflow .yr{flex:1;min-width:88px;text-align:center;background:var(--paper);border:1px solid var(--line-soft);border-radius:9px;padding:9px 6px;font-family:"Hiragino Kaku Gothic ProN",sans-serif}
.yearflow .yr .yl{font-size:11px;color:var(--ink-soft)}
.yearflow .yr .yv{font-size:14px;font-weight:600;margin-top:3px}
.yearflow .yr.first{background:var(--accent-soft);border-color:#bcd8cf}
.yearflow .yr.first .yl{color:var(--accent-deep)}
.yearflow .yr.first .yv{color:var(--accent-deep)}
.note6{margin-top:12px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:12px;color:var(--warm);background:var(--warm-soft);border:1px solid #ecd9c9;border-radius:8px;padding:9px 12px}
.note6 b{font-weight:600}

/* table */
table{width:100%;border-collapse:collapse;margin-top:16px;font-family:"Hiragino Kaku Gothic ProN",sans-serif;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line-soft)}
th{background:var(--accent);color:#fff;font-weight:500;font-size:12px;letter-spacing:.03em;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
th .ar{opacity:.5;font-size:10px;margin-left:3px}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:var(--accent-soft)}
tr.clk{cursor:pointer}
tr.clk:hover td{background:var(--accent-soft)}
.tap{font-size:11px;color:var(--accent-deep);background:var(--accent-soft);padding:2px 8px;border-radius:20px;margin-left:6px}
.catpill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--accent-soft);color:var(--accent-deep);white-space:nowrap}
.modal-overlay{position:fixed;inset:0;background:rgba(28,39,51,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:32px 18px;overflow:auto}
.modal-overlay.show{display:flex;animation:fade .18s ease}
.modal-box{position:relative;width:100%;max-width:760px;margin:auto 0}
.modal-close{position:absolute;top:-14px;right:-6px;z-index:2;width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:20px;line-height:1;cursor:pointer;box-shadow:var(--shadow);font-family:sans-serif}
.modal-close:hover{color:var(--ink);background:#fff}
.modal-box .card{margin-top:0}
tr:last-child td{border-bottom:none}
td .un{font-family:"Hiragino Mincho ProN",serif;font-weight:600}
.lo{color:var(--accent-deep);font-weight:600}
.count{font-size:12px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;margin-top:14px}
.empty{text-align:center;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;padding:40px;font-size:13px}
.foot{margin-top:34px;padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif;line-height:1.8}
.scroll{max-height:62vh;overflow:auto;border-radius:12px}
@media(max-width:760px){.figs{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>2023年度　公立・私立大学学費検索</h1>
    <span class="sub">私立・公立大学 学部・学科別</span>
    <span class="year">入学生データ</span>
  </header>

  <nav class="tabs">
    <button data-tab="search" class="on">大学を調べる</button>
    <button data-tab="compare">エリア×分野で比べる</button>
    <button data-tab="list">分野から探す</button>
  </nav>

  <!-- TAB1 -->
  <section class="panel on" id="tab-search">
    <div class="field suggest">
      <label class="lab">大学名を入力（一部でも検索できます）</label>
      <input type="text" id="uniInput" placeholder="例：早稲田、青森、看護…" autocomplete="off">
      <div class="suggest-list" id="uniSuggest"></div>
      <div class="hint">大学名を選ぶと、学部・学科が表示されます</div>
    </div>
    <div class="row" style="margin-top:14px">
      <div class="field"><label class="lab">学部・学科</label>
        <select id="depSelect" disabled><option>まず大学を選んでください</option></select>
      </div>
    </div>
    <div id="searchResult"></div>
  </section>

  <!-- TAB2 -->
  <section class="panel" id="tab-compare">
    <div class="row">
      <div class="field"><label class="lab">エリア</label>
        <select id="cmpRegion"></select></div>
      <div class="field"><label class="lab">都道府県（任意）</label>
        <select id="cmpPref"><option value="">すべて</option></select></div>
      <div class="field"><label class="lab">分野</label>
        <select id="cmpCat"></select></div>
    </div>
    <div id="compareResult"></div>
  </section>

  <!-- TAB3 -->
  <section class="panel" id="tab-list">
    <div class="row">
      <div class="field"><label class="lab">分野</label>
        <select id="lstCat"></select></div>
      <div class="field"><label class="lab">並び順</label>
        <select id="lstSort">
          <option value="total">卒業まで総額が安い順</option>
          <option value="first">初年度納入額が安い順</option>
          <option value="min">入学時最低納入額が安い順</option>
          <option value="region">エリア順</option>
        </select></div>
    </div>
    <div id="listResult"></div>
  </section>

  <div class="foot">
    ※ 表示金額は2023年度入学生向けの公表データに基づく目安です。実際の納入額・最新情報は各大学の募集要項で必ずご確認ください。<br>
    ※「年間目安（2年目以降）」は授業料・施設費等の継続費用、「初年度最低納入金」は入学手続時に最低限必要な額です。学科により別途費用がかかる場合があります。<br>
    まなびシード｜2023年度　公立・私立大学学費検索（オフライン版）
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" aria-label="閉じる">×</button>
    <div id="modalBody"></div>
  </div>
</div>

const K = {}; DATA.keys.forEach((k,i)=>K[k]=i);
const ROWS = DATA.rows;
const REGIONS = ["北海道","東北","関東","甲信越・北陸","東海","近畿","中国","四国","九州・沖縄"];
const CATS = ["文系","理系","医歯薬・獣医","看護・医療","教育・保育","芸術"];
const g=(r,k)=>r[K[k]];
const yen=v=> (v==null||v==='')?'—':'¥'+Number(v).toLocaleString('ja-JP');
const yenS=v=> (v==null||v==='')?'—':Number(v).toLocaleString('ja-JP');

// annual recurring (2年目以降) preference: y2 if present else sum of recurring parts
function nYears(r){ return g(r,'y6')!=null ? 6 : (g(r,'y5')!=null ? 5 : 4); }
function annual(r){
  const y2=g(r,'y2'); if(y2!=null) return y2;
  const parts=['ju','shi','jis','to'].map(k=>g(r,k)).filter(v=>v!=null);
  if(parts.length) return parts.reduce((a,b)=>a+b,0);
  return null;
}
function totalCalc(r){
  let t=g(r,'total'); if(t!=null) return t;
  const f=g(r,'first'); const a=annual(r);
  if(f!=null&&a!=null) return f+a*(nYears(r)-1);
  return null;
}

/* ---------- TAB1: search ---------- */
const uniInput=document.getElementById('uniInput');
const uniSuggest=document.getElementById('uniSuggest');
const depSelect=document.getElementById('depSelect');
const searchResult=document.getElementById('searchResult');
const UNIS=[...new Set(ROWS.map(r=>g(r,'u')))];
let curUni=null, actIdx=-1;

uniInput.addEventListener('input',()=>{
  const q=uniInput.value.trim(); actIdx=-1;
  if(!q){uniSuggest.classList.remove('show');return;}
  const hit=UNIS.filter(u=>u.includes(q)).slice(0,30);
  if(!hit.length){uniSuggest.classList.remove('show');return;}
  uniSuggest.innerHTML=hit.map(u=>`<div data-u="${u}">${u}</div>`).join('');
  uniSuggest.classList.add('show');
  uniSuggest.querySelectorAll('div').forEach(d=>d.onclick=()=>pickUni(d.dataset.u));
});
uniInput.addEventListener('keydown',e=>{
  const items=[...uniSuggest.querySelectorAll('div')];
  if(!items.length)return;
  if(e.key==='ArrowDown'){actIdx=Math.min(actIdx+1,items.length-1);e.preventDefault();}
  else if(e.key==='ArrowUp'){actIdx=Math.max(actIdx-1,0);e.preventDefault();}
  else if(e.key==='Enter'){if(actIdx>=0){pickUni(items[actIdx].dataset.u);}return;}
  else return;
  items.forEach((it,i)=>it.classList.toggle('act',i===actIdx));
  if(items[actIdx])items[actIdx].scrollIntoView({block:'nearest'});
});
document.addEventListener('click',e=>{if(!e.target.closest('.suggest'))uniSuggest.classList.remove('show');});

function pickUni(u){
  curUni=u; uniInput.value=u; uniSuggest.classList.remove('show');
  const deps=ROWS.filter(r=>g(r,'u')===u);
  depSelect.disabled=false;
  depSelect.innerHTML=deps.map((r,i)=>{
    let lbl=g(r,'f'); const d=g(r,'d'),s=g(r,'s');
    if(d&&d!=='全学科')lbl+=' '+d; if(s)lbl+='（'+s+'）';
    return `<option value="${i}">${lbl}</option>`;
  }).join('');
  showDep(deps[0],deps);
  depSelect.onchange=()=>showDep(deps[depSelect.value],deps);
}

function cardHTML(r){
  const a=annual(r), tot=totalCalc(r), first=g(r,'first'), min=g(r,'min');
  const ny=nYears(r);
  const dlabel=(()=>{let s=g(r,'f');const d=g(r,'d');if(d&&d!=='全学科')s+=' '+d;return s;})();
  const years=['first','y2','y3','y4','y5','y6'].map(k=>g(r,k));
  const ylab=['1年','2年','3年','4年','5年','6年'];
  let yf='';
  years.forEach((v,i)=>{if(v!=null)yf+=`<div class="yr${i===0?' first':''}"><div class="yl">${ylab[i]}${i===0?'（初年度）':''}</div><div class="yv">${yenS(v)}</div></div>`;});
  return `
  <div class="card">
    <div class="uni">${g(r,'u')}<span class="tag">${g(r,'pref')}</span><span class="tag r">${g(r,'cat')}</span><span class="tag y">${ny}年制</span></div>
    <div class="fac">${dlabel}</div>
    <div class="figs">
      <div class="fig hero"><div class="k">${ny}年間トータル</div><div class="v">${yen(tot)}</div></div>
      <div class="fig accent"><div class="k">初年度 最低納入金</div><div class="v">${yen(min)}</div></div>
      <div class="fig"><div class="k">初年度 納入額</div><div class="v">${yen(first)}</div></div>
      <div class="fig"><div class="k">年間目安（2年目〜）</div><div class="v">${yen(a)}</div></div>
    </div>
    <div class="brk">
      <h4>1年ごとの納入額（${ny}年間）</h4>
      <div class="yearflow">${yf||'<span class="hint">データなし</span>'}</div>
      ${ny>4?'<div class="note6">この学科は <b>'+ny+'年制</b> です。卒業までに '+ny+' 年分の学費がかかります。</div>':''}
    </div>
    <div class="brk">
      <h4>初年度の内訳</h4>
      <div class="brk-grid">
        <div class="li"><span>入学金</span><span>${yen(g(r,'nyu'))}</span></div>
        <div class="li"><span>授業料</span><span>${yen(g(r,'ju'))}</span></div>
        <div class="li"><span>施設・設備費 等</span><span>${yen(g(r,'shi'))}</span></div>
        <div class="li"><span>実習費 等</span><span>${yen(g(r,'jis'))}</span></div>
        <div class="li"><span>その他</span><span>${yen(g(r,'to'))}</span></div>
      </div>
    </div>
  </div>`;
}

function showDetail(r){
  document.getElementById('modalBody').innerHTML=cardHTML(r);
  const ov=document.getElementById('modalOverlay');
  ov.classList.add('show');
  document.getElementById('modalBox').scrollTop=0;
}
function closeDetail(){document.getElementById('modalOverlay').classList.remove('show');}

/* ---------- TAB2: compare ---------- */
const cmpRegion=document.getElementById('cmpRegion');
const cmpPref=document.getElementById('cmpPref');
const cmpCat=document.getElementById('cmpCat');
const compareResult=document.getElementById('compareResult');
cmpRegion.innerHTML=REGIONS.map(r=>`<option>${r}</option>`).join('');
cmpCat.innerHTML='<option value="">すべて</option>'+CATS.map(c=>`<option>${c}</option>`).join('');
cmpRegion.value="東北";
function fillPref(){
  const reg=cmpRegion.value;
  const prefs=[...new Set(ROWS.filter(r=>g(r,'region')===reg).map(r=>g(r,'pref')))];
  cmpPref.innerHTML='<option value="">すべて</option>'+prefs.map(p=>`<option>${p}</option>`).join('');
}
let cmpSort={key:'total',dir:1};
function renderCompare(){
  const reg=cmpRegion.value,pref=cmpPref.value,cat=cmpCat.value;
  let rs=ROWS.map((r,i)=>({_i:i,r})).filter(o=>g(o.r,'region')===reg&&(!cat||g(o.r,'cat')===cat)&&(!pref||g(o.r,'pref')===pref));
  rs=rs.map(o=>{const r=o.r;return {idx:o._i,u:g(r,'u'),pref:g(r,'pref'),cat:g(r,'cat'),ny:nYears(r),lab:(()=>{let s=g(r,'f');const d=g(r,'d');if(d&&d!=='全学科')s+=' '+d;return s;})(),first:g(r,'first'),min:g(r,'min'),annual:annual(r),total:totalCalc(r)};});
  const k=cmpSort.key,dir=cmpSort.dir;
  rs.sort((a,b)=>{let x=a[k],y=b[k];if(x==null)return 1;if(y==null)return -1;if(typeof x==='string')return x.localeCompare(y,'ja')*dir;return (x-y)*dir;});
  const minTotal=Math.min(...rs.filter(r=>r.total!=null).map(r=>r.total));
  const has6=rs.some(r=>r.ny>4);
  if(!rs.length){compareResult.innerHTML='<div class="empty">該当する学科が見つかりませんでした。条件を変えてお試しください。</div>';return;}
  const showCat=!cat;
  const th=(lbl,key)=>`<th data-k="${key}">${lbl}<span class="ar">${cmpSort.key===key?(dir>0?'▲':'▼'):'⇅'}</span></th>`;
  compareResult.innerHTML=`
  ${has6?'<div class="note6" style="margin-top:16px">この一覧には <b>4年制と6年制</b> が混在しています。総額は「年制」の欄をあわせてご覧ください（6年制は卒業まで6年分かかります）。</div>':''}
  <table><thead><tr>
    ${th('大学','u')}${th('都道府県','pref')}${showCat?th('分野','cat'):''}<th>学部・学科</th>${th('年制','ny')}
    ${th('初年度納入','first')}${th('入学時最低納入額','min')}${th('年間(2年〜)','annual')}${th('卒業まで総額','total')}
  </tr></thead><tbody>
  ${rs.map(r=>`<tr class="clk" data-idx="${r.idx}">
    <td><span class="un">${r.u}</span></td><td>${r.pref}</td>${showCat?'<td><span class="catpill">'+r.cat+'</span></td>':''}<td>${r.lab}</td>
    <td class="num">${r.ny>4?'<b style=\"color:var(--warm)\">'+r.ny+'年</b>':r.ny+'年'}</td>
    <td class="num">${yenS(r.first)}</td><td class="num">${yenS(r.min)}</td>
    <td class="num">${yenS(r.annual)}</td>
    <td class="num ${r.total===minTotal?'lo':''}">${yenS(r.total)}</td>
  </tr>`).join('')}
  </tbody></table>
  <div class="count">${rs.length}件　／　卒業まで総額が最も低いのは <b>${yen(minTotal)}</b>　<span class="tap">行をタップすると詳細が見られます</span></div>`;
  compareResult.querySelectorAll('th[data-k]').forEach(h=>h.onclick=()=>{
    const key=h.dataset.k;
    if(cmpSort.key===key)cmpSort.dir*=-1;else{cmpSort={key,dir:1};}
    renderCompare();
  });
  compareResult.querySelectorAll('tr.clk').forEach(tr=>tr.onclick=()=>showDetail(ROWS[+tr.dataset.idx]));
}
cmpRegion.onchange=()=>{fillPref();renderCompare();};
cmpPref.onchange=renderCompare; cmpCat.onchange=renderCompare;
fillPref();renderCompare();

/* ---------- TAB3: list ---------- */
const lstCat=document.getElementById('lstCat');
const lstSort=document.getElementById('lstSort');
const listResult=document.getElementById('listResult');
lstCat.innerHTML='<option value="">すべて</option>'+CATS.map(c=>`<option>${c}</option>`).join('');
function renderList(){
  const cat=lstCat.value,sort=lstSort.value;
  let rs=ROWS.map((r,i)=>({_i:i,r})).filter(o=>!cat||g(o.r,'cat')===cat).map(o=>{const r=o.r;return {idx:o._i,
    u:g(r,'u'),pref:g(r,'pref'),region:g(r,'region'),cat:g(r,'cat'),ny:nYears(r),
    lab:(()=>{let s=g(r,'f');const d=g(r,'d');if(d&&d!=='全学科')s+=' '+d;return s;})(),
    first:g(r,'first'),min:g(r,'min'),total:totalCalc(r)};});
  if(sort==='region'){
    const ord={};REGIONS.forEach((r,i)=>ord[r]=i);
    rs.sort((a,b)=>(ord[a.region]-ord[b.region])||((a.total??9e9)-(b.total??9e9)));
  }else{
    rs.sort((a,b)=>(a[sort]??9e9)-(b[sort]??9e9));
  }
  const has6=rs.some(r=>r.ny>4);
  const showCat=!cat;
  const cols=showCat?8:7;
  let body='', cur='';
  rs.forEach(r=>{
    if(sort==='region'&&r.region!==cur){cur=r.region;body+=`<tr><td colspan="${cols}" style="background:var(--accent-soft);color:var(--accent-deep);font-weight:600">${cur}</td></tr>`;}
    body+=`<tr class="clk" data-idx="${r.idx}"><td><span class="un">${r.u}</span></td><td>${r.pref}</td>${showCat?'<td><span class="catpill">'+r.cat+'</span></td>':''}<td>${r.lab}</td><td class="num">${r.ny>4?'<b style=\"color:var(--warm)\">'+r.ny+'年</b>':r.ny+'年'}</td><td class="num">${yenS(r.first)}</td><td class="num">${yenS(r.min)}</td><td class="num">${yenS(r.total)}</td></tr>`;
  });
  listResult.innerHTML=`
  ${has6?'<div class="note6" style="margin-top:16px">この一覧には <b>6年制</b>（医・歯・薬・獣医など）が含まれます。「卒業まで総額」は年制の分だけ年数がかかる点にご注意ください。</div>':''}
  <table><thead><tr><th>大学</th><th>都道府県</th>${showCat?'<th>分野</th>':''}<th>学部・学科</th><th>年制</th><th>初年度納入</th><th>入学時最低納入額</th><th>卒業まで総額</th></tr></thead>
  <tbody>${body}</tbody></table>
  <div class="count">${rs.length}件　<span class="tap">行をタップすると詳細が見られます</span></div>`;
  listResult.querySelectorAll('tr.clk').forEach(tr=>tr.onclick=()=>showDetail(ROWS[+tr.dataset.idx]));
}
lstCat.onchange=renderList; lstSort.onchange=renderList;
renderList();
</script>
</body>
</html>
